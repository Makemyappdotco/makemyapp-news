name: Generate MakeMyApp AI News

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *" # 9:00 AM IST daily

permissions:
  contents: write

env:
  TZ: Asia/Kolkata

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate news creatives
        run: npm run generate

      - name: Upload generated files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: make-my-app-news-output
          path: |
            output/latest
            output/archive
          if-no-files-found: error
          retention-days: 30

      - name: Commit generated latest output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/latest output/archive || true
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "Generate latest AI news creatives"
            git push
          fi
